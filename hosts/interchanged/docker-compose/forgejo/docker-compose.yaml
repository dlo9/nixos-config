services:
  forgejo:
    networks:
      - traefik_shared

    container_name: forgejo

    image: codeberg.org/forgejo/forgejo:15

    volumes:
      - ${HOME}/.local/state/docker-compose/forgejo/data:/data

    # Publish SSH on 2222 to avoid colliding with the host sshd on 22
    ports:
      - "2222:22"

    environment:
      TZ: America/Los_Angeles
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__ENABLE_REVERSE_PROXY_AUTHENTICATION: "true"
      FORGEJO__service__ENABLE_REVERSE_PROXY_AUTO_REGISTRATION: "true"
      FORGEJO__security__REVERSE_PROXY_AUTHENTICATION_HEADER: Remote-User
      FORGEJO__server__DOMAIN: git.laptop
      FORGEJO__server__ROOT_URL: http://git.laptop/
      FORGEJO__server__SSH_DOMAIN: git.laptop
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__server__SSH_LISTEN_PORT: "22"
      FORGEJO__repository__ENABLE_PUSH_CREATE_USER: "true"

      # Auto login
      ENABLE_REVERSE_PROXY_AUTHENTICATION: "true"
      ENABLE_REVERSE_PROXY_AUTO_REGISTRATION: "true"
      ENABLE_REVERSE_PROXY_FULL_NAME: "true"

    restart: always

    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_shared
      - traefik.http.routers.forgejo.rule=Host(`git.laptop`)
      - traefik.http.services.forgejo.loadbalancer.server.port=3000
      - traefik.http.routers.forgejo.middlewares=auth-david

networks:
  traefik_shared:
    external: true
