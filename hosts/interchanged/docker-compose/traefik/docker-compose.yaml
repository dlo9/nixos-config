services:
  traefik:
    networks:
      - shared

    container_name: traefik

    image: traefik:v3.7.1

    command: --api.insecure=true --providers.docker

    ports:
      - "80:80"

    # The podman socket is SELinux-labeled user_tmp_t inside the Fedora CoreOS VM;
    # disable label confinement so traefik (container_t) can connect to it.
    security_opt:
      - label=disable

    volumes:
      # Rootless podman's docker-compatible socket inside the VM (PODMAN_UID = the VM
      # user's uid, which mirrors the host uid; set by all-docker-compose.sh / fish).
      # Traefik's --providers.docker reads it at the container's default /var/run/docker.sock.
      - /run/user/${PODMAN_UID}/podman/podman.sock:/var/run/docker.sock:ro

    restart: always

    labels:
      - traefik.enable=true
      - traefik.docker.network=shared
      - traefik.http.routers.dashboard.rule=Host(`traefik.laptop`)
      - traefik.http.routers.dashboard.service=api@internal

      # Middleware for authenticating as the "david" user
      - traefik.http.middlewares.auth-david.headers.customrequestheaders.Remote-User=david # Linkding
      - traefik.http.middlewares.auth-david.headers.customrequestheaders.X-Webauth-User=david # Forgejo
      - traefik.http.middlewares.auth-david.headers.customrequestheaders.X-Webauth-Fullname=David Orchard # Forgejo

networks:
  shared:
